services:
  - type: web
    name: videovault-server
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      apt-get install -y ffmpeg || true
    startCommand: gunicorn app:app --workers 2 --timeout 300 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
